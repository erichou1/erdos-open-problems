name: Build site data

# Regenerates data.json (and status.csv) from the committed solution files so
# the GitHub Pages site at https://erichou1.github.io/erdos-open-problems/
# stays in sync automatically. Triggers whenever new solutions land in
# outputs/, when the generator changes, or manually from the Actions tab.

on:
  push:
    branches: [main]
    paths:
      - "outputs/chatgpt/**"
      - "open/individual/**"
      - "build_status_sheet.py"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-site
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Generator is standard-library only — no dependencies to install.
      - name: Regenerate data feed
        run: python build_status_sheet.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain data.json status.csv)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json status.csv
            git commit -m "chore: rebuild site data feed [skip ci]"
            git push
          else
            echo "data feed already up to date"
          fi
